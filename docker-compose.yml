
# ─── Networks ─────────────────────────────────────────────────────────────────
networks:
  portal-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

# ─── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  pgadmin_data:
    driver: local

services:

  # ════════════════════════════════════════════════════
  # PostgreSQL 16 — Primary Database
  # ════════════════════════════════════════════════════
  postgres:
    image: postgres:16-alpine
    container_name: gcp-portal-postgres
    restart: unless-stopped
    networks:
      - portal-network
    environment:
      POSTGRES_DB: gcp_portal
      POSTGRES_USER: portal
      POSTGRES_PASSWORD: portal123
      POSTGRES_HOST_AUTH_METHOD: md5
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portal -d gcp_portal"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    command: >
      postgres
        -c max_connections=200
        -c shared_buffers=256MB
        -c effective_cache_size=768MB
        -c log_statement=all
        -c log_duration=on

  # ════════════════════════════════════════════════════
  # Redis 7 — Task Queue + WebSocket Broker + Cache
  # ════════════════════════════════════════════════════
  redis:
    image: redis:7-alpine
    container_name: gcp-portal-redis
    restart: unless-stopped
    networks:
      - portal-network
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ════════════════════════════════════════════════════
  # pgAdmin 4 — Database Browser UI
  # ════════════════════════════════════════════════════
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: gcp-portal-pgadmin
    restart: unless-stopped
    networks:
      - portal-network
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@portal.local
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy

  # ════════════════════════════════════════════════════
  # MailHog — Local SMTP Server for Email Testing
  # ════════════════════════════════════════════════════
  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: gcp-portal-mailhog
    restart: unless-stopped
    networks:
      - portal-network
    ports:
      - "1025:1025"    # SMTP port
      - "8025:8025"    # Web UI

  # ════════════════════════════════════════════════════
  # RedisInsight — Redis Browser UI (optional)
  # ════════════════════════════════════════════════════
  redisinsight:
    image: redislabs/redisinsight:latest
    container_name: gcp-portal-redisinsight
    restart: unless-stopped
    networks:
      - portal-network
    ports:
      - "5540:5540"
    depends_on:
      redis:
        condition: service_healthy

